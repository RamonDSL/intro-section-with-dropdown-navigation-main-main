<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/cssmedia.css">
  <title>Frontend Mentor | Intro section with dropdown navigation</title>
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <header>
    <div class="tela"></div>
    <div class="logo">
      <img src="./images/logo.svg" alt="">
    </div>
    <nav>
      <button class="btn-menu"><img src="./images/icon-menu.svg" alt=""></button>
      <ul class="navbar">
        <div class="left">
          <li>
            <a href="#" class="features">Features<img src="./images/icon-arrow-down.svg" alt=""></a>
            <ul class="menu-features">
              <li><a href="#"><img src="./images/icon-todo.svg" alt="">Todo List</a></li>
              <li><a href="#"><img src="./images/icon-calendar.svg" alt="">Calendar</a></li>
              <li><a href="#"><img src="./images/icon-reminders.svg" alt="">Reminders</a></li>
              <li><a href="#"><img src="./images/icon-planning.svg" alt="">Planning</a></li>
            </ul>
          </li>
          <li>
            <a href="#" class="company">Company<img src="./images/icon-arrow-down.svg" alt=""></a>
            <ul class="menu-company">
              <li><a href="#">History</a></li>
              <li><a href="#">Our Team</a></li>
              <li><a href="#">Blog</a></li>
            </ul>
          </li>
          <li><a href="#">Careers</a></li>
          <li><a href="#">About</a></li>
        </div>
        <div class="rigth">
          <li><button>Login</button></li>
          <li><button class="register">Register</button></li>
        </div>
      </ul>
    </nav>
  </header>
  <main>
    <div class="rigth">
      <picture>
        <source media="(max-width: 768px)" srcset="./images/image-hero-mobile.png" type="image/png">
        <img src="./images/image-hero-desktop.png" alt="">
      </picture>
    </div>
    <div class="left">
      <div class="conteudo">
        <h1>Make remote work</h1>
        <p>
          Get your team in sync, no matter your location. Streamline processes, 
          create team rituals, and watch productivity soar.
        </p>
        <button>Learn more</button>
      </div>
      <div class="icons">
        <img src="./images/client-databiz.svg" alt="">
        <img src="./images/client-audiophile.svg" alt="">
        <img src="./images/client-meet.svg" alt="">
        <img src="./images/client-maker.svg" alt="">
      </div>
    </div>
  </main>
  <script src="./src/JS/app.js"></script>
</body>
</html>
